<html lang="ja">

<meta charset="UTF-8">

<title>日本語復習</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { width:100%; height:100%; font-family:-apple-system,"Hiragino Sans","Yu Gothic",sans-serif; background:#fafafa; color:#1f2937; }
body { display:flex; flex-direction:column; overflow:hidden; }

.header { padding:16px 20px; background:#f5e6d3; border-bottom:2px solid #d4a574; flex-shrink:0; display:flex; justify-content:space-between; align-items:center; }
.header h1 { font-size:22px; font-weight:700; }
.header-date { font-size:12px; color:#6b7280; }
.header-stats { font-size:14px; font-weight:600; padding:6px 14px; background:#fff; border-radius:16px; box-shadow:0 1px 3px rgba(0,0,0,.1); }

.tabs { display:flex; background:#fff; border-bottom:1px solid #e5e7eb; flex-shrink:0; }
.tab { flex:1; padding:14px; border:none; background:transparent; cursor:pointer; font-size:14px; font-weight:600; color:#9ca3af; border-bottom:3px solid transparent; }
.tab.active { color:#1f2937; border-bottom-color:#d4a574; }

.panel { display:none; flex:1; flex-direction:column; overflow:hidden; }
.panel.active { display:flex; }

.progress { text-align:center; padding:12px 20px 4px; font-size:13px; color:#6b7280; font-weight:600; flex-shrink:0; }
.progress-bar { height:5px; background:#e5e7eb; margin:0 20px 8px; border-radius:3px; overflow:hidden; }
.progress-fill { height:100%; background:linear-gradient(90deg,#d4a574,#e8c9a8); transition:width .3s; }

.card-area { flex:1; display:flex; align-items:center; justify-content:center; padding:16px 20px; overflow-y:auto; }
.card { width:100%; max-width:400px; min-height:260px; background:#fff; border-radius:16px; box-shadow:0 4px 12px rgba(0,0,0,.08); cursor:pointer; user-select:none; -webkit-user-select:none; display:flex; align-items:center; justify-content:center; padding:32px 24px; text-align:center; }
.card:active { box-shadow:0 2px 6px rgba(0,0,0,.12); }

.card-label { font-size:11px; color:#9ca3af; text-transform:uppercase; letter-spacing:.5px; margin-bottom:10px; }
.card-word { font-size:32px; font-weight:700; color:#1f2937; margin-bottom:8px; line-height:1.3; word-break:keep-all; }
.card-reading { font-size:18px; color:#d4a574; margin-bottom:8px; font-weight:500; }
.card-meaning { font-size:16px; color:#6b7280; line-height:1.5; }
.card-hint { font-size:13px; color:#c0c0c0; margin-top:12px; }
.card-example { font-size:14px; color:#6b7280; margin-top:12px; padding-top:12px; border-top:1px solid #e5e7eb; line-height:1.5; }
.card-date { font-size:11px; color:#c0c0c0; margin-top:12px; }

.card-wrong { font-size:18px; color:#1f2937; line-height:1.6; font-weight:500; }
.card-correct { font-size:18px; color:#16a34a; line-height:1.6; font-weight:500; margin-bottom:12px; }
.card-expl { font-size:15px; color:#6b7280; line-height:1.6; }

.controls { display:flex; gap:10px; padding:16px 20px; background:#fff; border-top:1px solid #e5e7eb; flex-shrink:0; justify-content:center; }
.btn { padding:12px 20px; border:none; border-radius:8px; font-size:14px; font-weight:600; cursor:pointer; }
.btn:active { transform:scale(.97); }
.btn-prev, .btn-next { background:#f3f4f6; color:#1f2937; min-width:60px; }
.btn-prev:disabled, .btn-next:disabled { opacity:.4; cursor:not-allowed; }
.btn-again { background:#fef2f2; color:#dc2626; }
.btn-ok { background:#f0fdf4; color:#16a34a; }

.empty { text-align:center; color:#9ca3af; padding:60px 20px; }
.empty-icon { font-size:48px; margin-bottom:16px; }

@media (prefers-color-scheme:dark) {
  html,body { background:#1a1a1a; color:#e5e7eb; }
  .header { background:#2a2420; border-bottom-color:#4a4440; }
  .header h1 { color:#e5e7eb; }
  .header-stats { background:#404040; color:#e5e7eb; }
  .tabs { background:#262626; border-bottom-color:#404040; }
  .tab { color:#6b7280; }
  .tab.active { color:#e5e7eb; }
  .panel { background:#1a1a1a; }
  .card { background:#262626; box-shadow:0 4px 12px rgba(0,0,0,.3); }
  .card-word { color:#e5e7eb; }
  .card-wrong { color:#e5e7eb; }
  .controls { background:#262626; border-top-color:#404040; }
  .btn-prev,.btn-next { background:#404040; color:#e5e7eb; }
  .progress-bar { background:#404040; }
}
</style>
</head>

<div class="panel active" id="panel-vocab">

<div class="panel" id="panel-grammar">

<div class="controls">

  <button class="btn btn-again" onclick="again()">もう一回</button>
  <button class="btn btn-ok" onclick="gotIt()">覚えた！</button>
  <button class="btn btn-next" id="btnNext" onclick="next()">次 →</button>
</div>

<script>
(function() {
  "use strict";

  var allItems = [];
  var currentTab = "vocab";
  var currentItems = [];
  var currentIndex = 0;
  var flipped = false;

  function esc(t) {
    if (!t) return "";
    var d = document.createElement("div");
    d.textContent = t;
    return d.innerHTML;
  }

  function loadData() {
    try {
      var el = document.getElementById("review-data");
      var data = JSON.parse(el.textContent);
      allItems = data.items || [];
      document.getElementById("hdate").textContent = data.lastUpdated || "";
    } catch(e) {
      console.error("Failed to load data:", e);
      allItems = [];
    }
  }

  var DAILY_LIMIT = 25;
  var todayDone = { vocab: [], grammar: [] };

  function initSRS() {
    var state = JSON.parse(localStorage.getItem("reviewState") || "{}");
    var changed = false;
    for (var i = 0; i < allItems.length; i++) {
      var id = allItems[i].id;
      if (!state[id]) {
        state[id] = { level: 0, next: today(), wrongCount: 0, lastWrong: "" };
        changed = true;
      } else if (typeof state[id].wrongCount === "undefined") {
        state[id].wrongCount = 0;
        state[id].lastWrong = "";
        changed = true;
      }
    }
    if (changed) localStorage.setItem("reviewState", JSON.stringify(state));

    // Load today's done list
    var doneData = JSON.parse(localStorage.getItem("todayDone") || "{}");
    if (doneData.date === today()) {
      todayDone = doneData.done || { vocab: [], grammar: [] };
    } else {
      todayDone = { vocab: [], grammar: [] };
      localStorage.setItem("todayDone", JSON.stringify({ date: today(), done: todayDone }));
    }
  }

  function today() {
    return new Date().toISOString().split("T")[0];
  }

  function isDue(id) {
    var state = JSON.parse(localStorage.getItem("reviewState") || "{}");
    if (!state[id]) return true;
    return state[id].next <= today();
  }

  function getCardPriority(id) {
    var state = JSON.parse(localStorage.getItem("reviewState") || "{}");
    var s = state[id];
    if (!s) return 0;
    // Priority: higher = review first. Wrong cards get highest priority
    var priority = 0;
    if (s.wrongCount > 0) priority += 100 + s.wrongCount * 10;
    if (s.level === 0) priority += 50; // new cards
    if (s.lastWrong === today()) priority += 200; // just got wrong today
    return priority;
  }

  function getItems(type) {
    var all = allItems.filter(function(x) { return x.type === type; });
    var state = JSON.parse(localStorage.getItem("reviewState") || "{}");

    // Split into due and not-due
    var due = all.filter(function(x) { return isDue(x.id); });

    // Sort due cards: wrong cards first, then by priority
    due.sort(function(a, b) { return getCardPriority(b.id) - getCardPriority(a.id); });

    // Calculate daily limit for this type
    var vocabAll = allItems.filter(function(x) { return x.type === "vocab"; });
    var gramAll = allItems.filter(function(x) { return x.type === "grammar"; });
    var vocabDue = vocabAll.filter(function(x) { return isDue(x.id); }).length;
    var gramDue = gramAll.filter(function(x) { return isDue(x.id); }).length;
    var totalDue = vocabDue + gramDue;

    var limit;
    if (totalDue <= DAILY_LIMIT) {
      limit = due.length; // all due cards fit
    } else {
      // Proportional split
      var ratio = type === "vocab" ? vocabDue / totalDue : gramDue / totalDue;
      limit = Math.max(5, Math.round(DAILY_LIMIT * ratio));
    }

    // Remove already-done cards from today, but keep wrong-again cards
    var doneList = todayDone[type] || [];
    var queue = due.filter(function(x) {
      if (doneList.indexOf(x.id) >= 0) {
        // Keep if it was marked wrong today (needs re-review)
        var s = state[x.id];
        return s && s.lastWrong === today();
      }
      return true;
    });

    // Apply limit
    queue = queue.slice(0, limit);

    return queue;
  }

  function nextReviewDate(level) {
    var intervals = [0, 1, 3, 7, 14, 30, 60];
    var d = new Date();
    d.setDate(d.getDate() + (intervals[level] || 60));
    return d.toISOString().split("T")[0];
  }

  window.switchTab = function(tab) {
    currentTab = tab;
    currentIndex = 0;
    flipped = false;

    document.getElementById("tab-vocab").className = tab === "vocab" ? "tab active" : "tab";
    document.getElementById("tab-grammar").className = tab === "grammar" ? "tab active" : "tab";
    document.getElementById("panel-vocab").className = tab === "vocab" ? "panel active" : "panel";
    document.getElementById("panel-grammar").className = tab === "grammar" ? "panel active" : "panel";

    currentItems = getItems(tab);
    render();
    updateStats();
  };

  function render() {
    var containerId = currentTab === "vocab" ? "card-vocab" : "card-grammar";
    var container = document.getElementById(containerId);

    if (currentItems.length === 0) {
      var doneCount = (todayDone[currentTab] || []).length;
      container.innerHTML = '<div class="empty"><div class="empty-icon">✓</div><div>今日の復習完了！</div><div style="margin-top:8px;font-size:14px">' + doneCount + '枚クリア</div></div>';
      updateNav();
      return;
    }

    var item = currentItems[currentIndex];
    var html = "";

    var cardState = JSON.parse(localStorage.getItem("reviewState") || "{}")[item.id] || {};
    var wrongBadge = cardState.wrongCount > 0 ? '<div style="font-size:11px;color:#dc2626;margin-bottom:6px">⚠ 要注意（' + cardState.wrongCount + '回間違い）</div>' : '';

    if (currentTab === "vocab") {
      if (!flipped) {
        html = '<div class="card" onclick="flip()">' +
          '<div>' +
          wrongBadge +
          '<div class="card-label">単語</div>' +
          '<div class="card-word">' + esc(item.word) + '</div>' +
          '<div class="card-hint">タップして答えを見る</div>' +
          '<div class="card-date">' + esc(item.date) + '</div>' +
          '</div></div>';
      } else {
        var readingHtml = item.reading ? '<div class="card-label">読み方</div><div class="card-reading">' + esc(item.reading) + '</div>' : '';
        var exampleHtml = item.example ? '<div class="card-example">例：' + esc(item.example) + '</div>' : '';
        html = '<div class="card" onclick="flip()">' +
          '<div>' +
          '<div class="card-word">' + esc(item.word) + '</div>' +
          readingHtml +
          '<div class="card-label" style="margin-top:12px">意味</div>' +
          '<div class="card-meaning">' + esc(item.meaning) + '</div>' +
          exampleHtml +
          '<div class="card-date">' + esc(item.date) + '</div>' +
          '</div></div>';
      }
    } else {
      if (!flipped) {
        html = '<div class="card" onclick="flip()">' +
          '<div>' +
          wrongBadge +
          '<div class="card-label">この文の間違いは？</div>' +
          '<div class="card-wrong">' + esc(item.wrong) + '</div>' +
          '<div class="card-hint">タップして答えを見る</div>' +
          '<div class="card-date">' + esc(item.date) + '</div>' +
          '</div></div>';
      } else {
        var correctHtml = item.correct ? '<div class="card-label" style="margin-top:8px">正しい文</div><div class="card-correct">→ ' + esc(item.correct) + '</div>' : '';
        var explHtml = item.explanation ? '<div class="card-label" style="margin-top:12px">解説</div><div class="card-expl">' + esc(item.explanation) + '</div>' : '';
        html = '<div class="card" onclick="flip()">' +
          '<div style="width:100%">' +
          '<div class="card-label">間違い</div>' +
          '<div class="card-wrong" style="margin-bottom:8px;text-decoration:line-through;color:#9ca3af">' + esc(item.wrong) + '</div>' +
          correctHtml +
          explHtml +
          '<div class="card-date">' + esc(item.date) + '</div>' +
          '</div></div>';
      }
    }

    container.innerHTML = html;
    updateNav();
  }

  window.flip = function() {
    flipped = !flipped;
    render();
  };

  window.next = function() {
    if (currentItems.length === 0) return;
    flipped = false;
    if (currentIndex < currentItems.length - 1) currentIndex++;
    else currentIndex = 0;
    render();
    updateStats();
  };

  window.prev = function() {
    if (currentItems.length === 0) return;
    flipped = false;
    if (currentIndex > 0) currentIndex--;
    else currentIndex = Math.max(0, currentItems.length - 1);
    render();
    updateStats();
  };

  window.gotIt = function() {
    if (currentItems.length === 0) return;
    var item = currentItems[currentIndex];
    var state = JSON.parse(localStorage.getItem("reviewState") || "{}");
    if (state[item.id]) {
      state[item.id].level = Math.min(6, state[item.id].level + 1);
      state[item.id].next = nextReviewDate(state[item.id].level);
      // Reduce wrong count gradually on success
      if (state[item.id].wrongCount > 0) state[item.id].wrongCount = Math.max(0, state[item.id].wrongCount - 1);
    }
    localStorage.setItem("reviewState", JSON.stringify(state));

    // Mark as done today
    markDone(item.id);

    // Remove from current queue and advance
    currentItems.splice(currentIndex, 1);
    if (currentItems.length === 0) {
      flipped = false;
      render();
      updateStats();
      return;
    }
    if (currentIndex >= currentItems.length) currentIndex = 0;
    flipped = false;
    render();
    updateStats();
  };

  window.again = function() {
    if (currentItems.length === 0) return;
    var item = currentItems[currentIndex];
    var state = JSON.parse(localStorage.getItem("reviewState") || "{}");
    if (state[item.id]) {
      state[item.id].level = 0;
      state[item.id].next = today();
      state[item.id].wrongCount = (state[item.id].wrongCount || 0) + 1;
      state[item.id].lastWrong = today();
    }
    localStorage.setItem("reviewState", JSON.stringify(state));

    // Move card to end of queue for re-review
    if (currentItems.length > 1) {
      var card = currentItems.splice(currentIndex, 1)[0];
      currentItems.push(card);
      if (currentIndex >= currentItems.length) currentIndex = 0;
    } else {
      currentIndex = 0;
    }
    flipped = false;
    render();
    updateStats();
  };

  function markDone(id) {
    var type = currentTab;
    if (todayDone[type].indexOf(id) < 0) {
      todayDone[type].push(id);
    }
    localStorage.setItem("todayDone", JSON.stringify({ date: today(), done: todayDone }));
  }

  function updateNav() {
    var p = document.getElementById("btnPrev");
    var n = document.getElementById("btnNext");
    p.disabled = currentItems.length <= 1;
    n.disabled = currentItems.length <= 1;
  }

  function updateStats() {
    var doneCount = (todayDone[currentTab] || []).length;
    var remaining = currentItems.length;
    document.getElementById("due").textContent = remaining;
    document.getElementById("total").textContent = remaining + doneCount;

    var progId = "prog-" + currentTab;
    var barId = "bar-" + currentTab;
    if (remaining > 0) {
      var total = remaining + doneCount;
      document.getElementById(progId).textContent = doneCount + "完了 / 残り" + remaining;
      document.getElementById(barId).style.width = (doneCount / total * 100) + "%";
    } else {
      document.getElementById(progId).textContent = doneCount + "完了！";
      document.getElementById(barId).style.width = "100%";
    }
  }

  // Init
  loadData();
  initSRS();
  switchTab("vocab");
})();
</script>
</body>
</html>
